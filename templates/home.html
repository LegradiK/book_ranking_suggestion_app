{% extends "base.html" %}
{% block content %}
<!-- Hero -->
<div class="hero-bar">
  <h1>📚 Book <span>Rankings</span></h1>
  <p class="subtitle">Discover your next obsession, backed by data.</p>
</div>
<div class="container">
  <!-- Filter bar -->
  <div class="filter-bar">
    <div class="filter-group">
      <label>Genre</label>
      <select id="filter-genre" onchange="applyFilters()">
        <option value="">All</option>
        {% for genre in genres %}
          <option value="{{ genre }}">{{ genre }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="filter-divider"></div>
    <div class="filter-group">
      <label>Sort by</label>
      <select id="sort-by" onchange="applyFilters()">
        <option value="rating">Rating</option>
        <option value="readinglog">Readinglog</option>
        <option value="title">Title A–Z</option>
        <option value="author">Author A–Z</option>
      </select>
    </div>
    <div class="filter-divider"></div>
    <div class="filter-group">
      <label>Show</label>
      <select id="filter-show" onchange="applyFilters()">
        {% for n in ["all", 10, 20, 30, 50, 100] %}
          <option value="{{ n }}" {% if n == limit %}selected{% endif %}>
            {{ n | capitalize }}
          </option>
        {% endfor %}
      </select>
    </div>
    <button class="export-csv" onclick="exportCSV()">Export CSV</button>
  </div>
  <!-- Results count -->
  <p class="results-count" id="results-count"></p>
  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="rank-col">#</th>
          <th style="text-align:center">Title</th>
          <th style="text-align:center">Author</th>
          <th style="text-align:center">Rating</th>
          <th style="text-align:center"">Genre</th>
          <th style="text-align:center">Year</th>
          <th style="text-align:right">Readinglog</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</div>

<script>
  window.BOOKS = {{ data | tojson }};
  console.log("BOOKS length:", window.BOOKS.length);
  console.log("First book:", window.BOOKS[0]);
</script>

{% endblock %}
